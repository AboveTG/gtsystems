<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GT Systems</title>

<style>
body {
    background:#0a0a0a;
    color:#e0e0e0;
    font-family:monospace;
    padding:40px;
}

textarea {
    width:100%;
    height:160px;
    background:#000;
    color:#00ff41;
    border:1px solid #333;
    padding:10px;
}

button {
    width:100%;
    padding:15px;
    margin-top:10px;
    background:#00ff41;
    border:none;
    cursor:pointer;
}

#results {
    margin-top:20px;
    border:1px solid #333;
    padding:15px;
    display:none;
}

.section {
    margin-top:10px;
}

h3 {
    color:#00ff41;
}
</style>
</head>

<body>

<h2>GT SYSTEMS</h2>

<textarea id="input"></textarea>

<button onclick="run()">ANALYZE</button>

<div id="results">

    <h3>PERSUASION SCORE: <span id="score">0</span></h3>

    <div class="section">
        <strong>Triggers</strong>
        <div id="triggers"></div>
    </div>

    <div class="section">
        <strong>Summary</strong>
        <div id="summary"></div>
    </div>

    <div class="section">
        <strong>Key Observations</strong>
        <pre id="observations"></pre>
    </div>

    <div class="section">
        <strong>Framing Notes</strong>
        <pre id="framing"></pre>
    </div>

</div>

<script>
async function startDecryption() {

    const textInput =
        document.getElementById('input').value.trim();

    if (!textInput) {
        alert("System requires input.");
        return;
    }

    const overlay =
        document.getElementById('overlay');

    const status =
        document.getElementById('status');

    const resultsArea =
        document.getElementById('results-area');

    const btn =
        document.getElementById('main-btn');

    // reset UI
    resultsArea.style.display = 'none';
    document.getElementById('noise-percent').innerText = "0";
    document.getElementById('noise-fill').style.width = "0%";
    document.getElementById('triggers-output').innerText = "";
    document.getElementById('analysis-output').innerText = "";
    document.getElementById('node-info').innerText = "";

    overlay.style.display = 'flex';
    btn.disabled = true;
    btn.innerText = "ANALYZING...";

    status.innerText = "CONNECTING TO GROUNDTRUTH NETWORK...";

    try {

        const response = await fetch('/api/analyze', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ text: textInput })
        });

        const data = await response.json();

        if (!response.ok) {
            throw new Error(data.error || "Analysis failed");
        }

        renderResults(data);

    } catch (err) {

        alert("SYSTEM ERROR:\n" + err.message);

    } finally {

        overlay.style.display = 'none';
        btn.disabled = false;
        btn.innerText = "Extract Ground Truth";
    }
}

function renderResults(data) {

    const score =
        data.noise_score || 0;

    document.getElementById('results-area')
        .style.display = 'block';

    document.getElementById('noise-percent')
        .innerText = score;

    document.getElementById('noise-fill')
        .style.width = score + "%";

    document.getElementById('triggers-output')
        .innerText =
            (data.emotional_triggers || []).join(", ");

    const lb = data.logic_breakdown || {};

    // IMPORTANT: support structured + fallback
    const summary =
        lb.summary || "No summary available.";

    const observations =
        (lb.key_observations || []).length
            ? lb.key_observations.join("\n")
            : "No key observations.";

    const framing =
        (lb.framing_notes || []).length
            ? lb.framing_notes.join("\n")
            : "No framing notes.";

    document.getElementById('analysis-output').innerText =
        `SUMMARY:\n${summary}\n\nKEY OBSERVATIONS:\n${observations}\n\nFRAMING NOTES:\n${framing}`;

    document.getElementById('node-info')
        .innerText =
        `DATA SOURCE: ${data.node || "PRIMARY NODE"}`;

    document.getElementById('results-area')
        .scrollIntoView({ behavior: 'smooth' });
}
</script>

</body>
</html>
