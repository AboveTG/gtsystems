<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<title>Ground Truth Systems</title>

<style>
body {
    margin:0;
    background:#0a0a0a;
    color:#e0e0e0;
    font-family:monospace;
}

#ui {
    width:520px;
    margin:auto;
    padding:20px;
}

textarea {
    width:100%;
    height:120px;
    background:#000;
    color:#00ff41;
    border:1px solid #333;
    padding:10px;
}

button {
    width:100%;
    padding:12px;
    margin-top:10px;
    background:#00ff41;
    border:none;
    font-weight:bold;
}

.panel {
    margin-top:12px;
    background:#111;
    padding:10px;
    border:1px solid #333;
}

.bar {
    height:10px;
    background:#222;
}

.bar > div {
    height:100%;
    background:#00ff41;
    width:0%;
}
</style>
</head>

<body>

<div id="ui">

<textarea id="input"></textarea>
<button onclick="run()">Analyze</button>

<div class="panel">
    <b>Input Strength:</b> <span id="signal">-</span><br>
    <b>Confidence:</b> <span id="quality">-</span>
</div>

<div class="panel">
    <b>Summary</b>
    <div id="summary"></div>
</div>

<div class="panel">
    <b>Main Idea</b>
    <div id="claim"></div>
</div>

<div class="panel">
    <b>Influence Level</b>
    <div class="bar"><div id="bar"></div></div>
</div>

<div class="panel">
    <b>Narrative Structure</b>
    <pre id="framing"></pre>
</div>

<div class="panel">
    <b>Risk</b>
    <div id="risk"></div>
</div>

<pre id="error"></pre>

</div>

<script>

async function run() {
    const input = document.getElementById("input").value.trim();
    const errorBox = document.getElementById("error");
    errorBox.innerText = "";

    if (!input) {
        errorBox.innerText = "No input provided";
        return;
    }

    try {
        const res = await fetch("/api/analyze", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ input })
        });

        const text = await res.text();

        let data;
        try {
            data = JSON.parse(text);
        } catch {
            errorBox.innerText = "Invalid server response:\n\n" + text;
            return;
        }

        if (!data.ok) {
            errorBox.innerText = data.error || "analysis_failed";
            return;
        }

        const r = data.report;

        document.getElementById("signal").innerText = data.meta.input_strength;
        document.getElementById("quality").innerText = data.meta.confidence_score;

        document.getElementById("summary").innerText = r.summary.short;
        document.getElementById("claim").innerText = r.primary_claim;

        document.getElementById("bar").style.width =
            Math.min(100, r.insights.influence_score * 100) + "%";

        document.getElementById("framing").innerText =
            JSON.stringify(r.framing.narrative_mix, null, 2);

        document.getElementById("risk").innerText =
            r.narrative_risk.level + " - " + r.narrative_risk.explanation;

    } catch (err) {
        errorBox.innerText = err.message;
    }
}
</script>

</body>
</html>
