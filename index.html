<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ground Truth Systems</title>

<style>
body {
    margin:0;
    background:#0a0a0a;
    color:#e0e0e0;
    font-family:monospace;
}

#ui {
    width:520px;
    margin:auto;
    padding:20px;
}

textarea {
    width:100%;
    height:120px;
    background:#000;
    color:#00ff41;
    border:1px solid #333;
    padding:10px;
}

button {
    width:100%;
    padding:12px;
    margin-top:10px;
    background:#00ff41;
    border:none;
    font-weight:bold;
    cursor:pointer;
}

.panel {
    margin-top:12px;
    background:#111;
    padding:10px;
    border:1px solid #333;
}

.bar {
    height:8px;
    background:#222;
}

.bar > div {
    height:100%;
    background:#00ff41;
    width:0%;
}
</style>
</head>

<body>

<div id="ui">

<textarea id="input" placeholder="Paste URL or text..."></textarea>
<button onclick="run()">ANALYZE</button>

<div class="panel">
    <b>Signal Level:</b> <span id="signal">-</span><br>
    <b>Confidence:</b> <span id="confidence">-</span>
</div>

<div class="panel">
    <b>Summary</b>
    <div id="summary">-</div>
</div>

<div class="panel">
    <b>Plain English Explanation</b>
    <div id="plain">-</div>
</div>

<div class="panel">
    <b>Influence Strength</b>
    <div class="bar"><div id="bar"></div></div>
    <div id="percent">-</div>
</div>

<div class="panel">
    <b>Narrative Frame</b>
    <pre id="framing">-</pre>
</div>

<div class="panel">
    <b>Key Conclusions</b>
    <pre id="conclusions">-</pre>
</div>

<div class="panel">
    <pre id="error"></pre>
</div>

</div>

<script>

async function run() {

    const input = document.getElementById("input").value.trim();
    document.getElementById("error").innerText = "";

    if (!input) {
        document.getElementById("error").innerText = "No input provided";
        return;
    }

    let data;

    try {
        const res = await fetch("/api/analyze", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ input })
        });

        const text = await res.text();

        try {
            data = JSON.parse(text);
        } catch {
            document.getElementById("error").innerText =
                "NON-JSON RESPONSE:\n\n" + text.slice(0, 4000);
            return;
        }

    } catch (err) {
        document.getElementById("error").innerText = err.message;
        return;
    }

    if (!data.ok) {
        document.getElementById("error").innerText =
            data.error || "analysis_failed";
        return;
    }

    const meta = data.meta || {};
    const report = data.report || {};
    const summary = report.summary || {};
    const influence = report.influence || {};

    // -----------------------
    // SAFE DISPLAY (NO UNDEFINED CRASHES)
    // -----------------------
    document.getElementById("signal").innerText =
        meta.signal_level ?? "-";

    document.getElementById("confidence").innerText =
        meta.analysis_quality ?? "-";

    document.getElementById("summary").innerText =
        summary.short ?? "-";

    document.getElementById("plain").innerText =
        summary.plain_english ?? "-";

    const intensity = influence.persuasion_score ?? 0;

    document.getElementById("bar").style.width =
        Math.min(100, intensity * 100) + "%";

    document.getElementById("percent").innerText =
        Math.round(intensity * 100) + "%";

    document.getElementById("framing").innerText =
        JSON.stringify(report.framing || {}, null, 2);

    document.getElementById("conclusions").innerText =
        (report.conclusions || []).join("\n") || "-";
}

</script>

</body>
</html>
