<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GT Systems</title>

<style>
body {
    background:#0a0a0a;
    color:#e0e0e0;
    font-family:monospace;
    padding:40px;
}

textarea {
    width:100%;
    height:160px;
    background:#000;
    color:#00ff41;
    border:1px solid #333;
    padding:10px;
}

button {
    width:100%;
    padding:15px;
    margin-top:10px;
    background:#00ff41;
    border:none;
    cursor:pointer;
}

#results {
    margin-top:20px;
    border:1px solid #333;
    padding:15px;
    display:none;
}

.section {
    margin-top:10px;
}

h3 {
    color:#00ff41;
}
</style>
</head>

<body>

<h2>GT SYSTEMS</h2>

<textarea id="input" placeholder="PASTE THE ARTICLE OR TEXT HERE"></textarea>

<button onclick="run()">ANALYZE</button>

<div id="results" style="display:none; margin-top:20px; text-align:left; background:#111; border:1px solid #333; padding:15px;">
    <h3 style="color:#00ff41;">Analysis Results</h3>

    <p>
        <strong>Persuasion Score:</strong>
        <span id="score"></span>%
    </p>

    <p>
        <strong>Techniques Detected:</strong><br>
        <span id="triggers"></span>
    </p>

    <p>
        <strong>Summary:</strong><br>
        <span id="summary"></span>
    </p>

    <p>
        <strong>Key Observations:</strong>
    </p>

    <ul id="observations"></ul>

    <p>
        <strong>Framing Notes:</strong>
    </p>

    <ul id="framing"></ul>

    <p style="color:#666;">
        Source Node:
        <span id="node"></span>
    </p>
</div>

<div id="results">

    <h3>PERSUASION SCORE: <span id="score">0</span></h3>

    <div class="section">
        <strong>Triggers</strong>
        <div id="triggers"></div>
    </div>

    <div class="section">
        <strong>Summary</strong>
        <div id="summary"></div>
    </div>

    <div class="section">
        <strong>Key Observations</strong>
        <pre id="observations"></pre>
    </div>

    <div class="section">
        <strong>Framing Notes</strong>
        <pre id="framing"></pre>
    </div>

</div>

<script>
async function run() {

    const text =
        document.getElementById("input").value.trim();

    if (!text) return alert("No input");

    const res =
        await fetch("/api/analyze", {
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({ text })
        });

    const data =
        await res.json();

    document.getElementById("results")
        .style.display = "block";

    document.getElementById("score")
        .innerText = data.noise_score ?? 0;

    document.getElementById("triggers")
        .innerText = (data.emotional_triggers || []).join(", ");

    const lb = data.logic_breakdown || {};

    document.getElementById("summary")
        .innerText = lb.summary || "No summary";

    document.getElementById("observations")
        .innerText = (lb.key_observations || []).join("\n");

    document.getElementById("framing")
        .innerText = (lb.framing_notes || []).join("\n");
}
</script>

</body>
</html>
