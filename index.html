<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GT Systems</title>

<style>
body {
    background:#0a0a0a;
    color:#e0e0e0;
    font-family:monospace;
    display:flex;
    justify-content:center;
    padding:40px;
}

.container { width:100%; max-width:900px; }

h1 { color:#00ff41; text-align:center; }

textarea {
    width:100%;
    height:180px;
    background:#000;
    color:#00ff41;
    border:1px solid #333;
    padding:12px;
}

button {
    width:100%;
    padding:14px;
    background:#00ff41;
    border:none;
    font-weight:bold;
    cursor:pointer;
}

.panel {
    margin-top:20px;
    background:#111;
    padding:15px;
    border:1px solid #333;
}

.bad { color:#ff4d4d; }
.warn { color:#ffcc00; }
.good { color:#00ff41; }
</style>
</head>

<body>

<div class="container">
<h1>GT SYSTEMS</h1>

<textarea id="input" placeholder="Paste text / URL / YouTube / PDF / image"></textarea>
<button onclick="run()">ANALYZE</button>

<div id="out" class="panel" style="display:none">
    <div id="signal"></div>
    <div>Node: <span id="node"></span></div>
    <div>Score: <span id="score"></span></div>
    <div>Confidence: <span id="conf"></span></div>
    <div>Layers: <pre id="layers"></pre></div>
</div>

</div>

<script>
async function run(){
    const input = document.getElementById("input").value.trim();
    if(!input) return;

    const res = await fetch("/api/analyze", {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({ input })
    });

    const data = await res.json();

    document.getElementById("out").style.display = "block";

    document.getElementById("node").innerText = data.node;
    document.getElementById("score").innerText = data.noise_score;
    document.getElementById("conf").innerText = data.confidence;
    document.getElementById("layers").innerText = JSON.stringify(data.layers, null, 2);
}
</script>

</body>
</html>
