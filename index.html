<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GT Systems</title>

<style>
body {
    background:#0a0a0a;
    color:#e0e0e0;
    font-family:monospace;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    margin:0;
    padding:20px;
}

.container { width:100%; max-width:900px; }

h1 { text-align:center; color:#00ff41; }

textarea {
    width:100%;
    height:220px;
    background:#000;
    color:#00ff41;
    border:1px solid #333;
    padding:12px;
}

button {
    width:100%;
    padding:15px;
    background:#00ff41;
    border:none;
    font-weight:bold;
    cursor:pointer;
}

#results { display:none; margin-top:20px; background:#111; padding:15px; }

.error { color:red; }
</style>
</head>

<body>

<div class="container">
<h1>GT SYSTEMS</h1>

<textarea id="input" placeholder="Paste text OR YouTube URL"></textarea>

<button onclick="run()">ANALYZE</button>

<div id="results">
    <div class="error" id="error"></div>

    <p>Score: <span id="score">-</span></p>
    <p>Confidence: <span id="confidence">-</span></p>
    <p>Source: <span id="sourceType">-</span></p>

    <p>Triggers: <span id="triggers"></span></p>
    <p>Summary: <span id="summary"></span></p>

    <ul id="observations"></ul>
    <ul id="framing"></ul>

    <p>Node: <span id="node"></span></p>
</div>
</div>

<script>
async function run() {
    const input = document.getElementById("input").value.trim();
    if (!input) return alert("Input required");

    const res = await fetch("/api/analyze", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ input })
    });

    let data;
    try {
        data = await res.json();
    } catch {
        const text = await res.text();
        document.getElementById("error").innerText =
            "Server returned non-JSON response:\n" + text;
        return;
    }

    document.getElementById("results").style.display = "block";

    if (!res.ok) {
        document.getElementById("error").innerText = data.error || "Request failed";
        return;
    }

    document.getElementById("error").innerText = "";
    document.getElementById("score").innerText = data.noise_score ?? 0;
    document.getElementById("confidence").innerText = data.confidence ?? 0;
    document.getElementById("sourceType").innerText = data.source_type ?? "unknown";

    document.getElementById("triggers").innerText =
        (data.emotional_triggers || []).join(", ");

    document.getElementById("summary").innerText =
        data.logic_breakdown?.summary || "";

    const obs = document.getElementById("observations");
    obs.innerHTML = "";
    (data.logic_breakdown?.key_observations || []).forEach(x => {
        const li = document.createElement("li");
        li.textContent = x;
        obs.appendChild(li);
    });

    const fr = document.getElementById("framing");
    fr.innerHTML = "";
    (data.logic_breakdown?.framing_notes || []).forEach(x => {
        const li = document.createElement("li");
        li.textContent = x;
        fr.appendChild(li);
    });

    document.getElementById("node").innerText = data.node || "unknown";
}
</script>

</body>
</html>
