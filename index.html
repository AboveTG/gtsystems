<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ground Truth Systems</title>

<style>
body {
    margin:0;
    background:#0a0a0a;
    color:#e0e0e0;
    font-family:monospace;
}

#ui {
    width:420px;
    padding:20px;
}

textarea {
    width:100%;
    height:120px;
    background:#000;
    color:#00ff41;
    border:1px solid #333;
    padding:10px;
}

button {
    width:100%;
    padding:12px;
    margin-top:10px;
    background:#00ff41;
    border:none;
    font-weight:bold;
    cursor:pointer;
}

.panel {
    margin-top:12px;
    background:#111;
    padding:10px;
    border:1px solid #333;
}

.bar {
    height:8px;
    background:#222;
    margin-top:6px;
}

.bar > div {
    height:100%;
    background:#00ff41;
    width:0%;
}
</style>
</head>

<body>

<div id="ui">

    <textarea id="input" placeholder="Paste URL, text, or video link"></textarea>
    <button onclick="run()">ANALYZE</button>

    <div class="panel">
        Signal: <span id="signal">-</span><br/>
        Quality: <span id="quality">-</span>
    </div>

    <div class="panel">
        Persuasion
        <div class="bar"><div id="intensity"></div></div>
    </div>

    <div class="panel">
        Summary
        <div id="summary"></div>
    </div>

    <div class="panel">
        Framing
        <pre id="framing"></pre>
    </div>

    <div class="panel">
        Error
        <pre id="error"></pre>
    </div>

</div>

<script>
async function run() {
    const input = document.getElementById("input").value;

    const res = await fetch("/api/analyze", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ input })
    });

    let data;
    try {
        data = await res.json();
    } catch (e) {
        document.getElementById("error").innerText =
            "INVALID_JSON_RESPONSE";
        return;
    }

    if (!data.ok) {
        document.getElementById("error").innerText =
            data.error || "unknown_error";
        return;
    }

    document.getElementById("error").innerText = "";

    document.getElementById("signal").innerText =
        data.meta?.signal_level ?? "-";

    document.getElementById("quality").innerText =
        data.meta?.analysis_quality ?? "-";

    const intensity = data.content?.persuasion_intensity ?? 0;
    document.getElementById("intensity").style.width =
        Math.min(100, intensity * 100) + "%";

    document.getElementById("summary").innerText =
        data.content?.summary ?? "-";

    document.getElementById("framing").innerText =
        JSON.stringify(data.content?.framing ?? {}, null, 2);
}
</script>

</body>
</html>
