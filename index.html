<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GT Systems | Ground Truth</title>

<style>

:root{
    --bg:#0a0a0a;
    --text:#e0e0e0;
    --accent:#00ff41;
    --subtle:#1a1a1a;
}

body{
    background:var(--bg);
    color:var(--text);
    font-family:monospace;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    margin:0;
    padding:20px;
}

.container{
    width:100%;
    max-width:800px;
}

h1{
    text-align:center;
    color:var(--accent);
}

.manifesto{
    background:var(--subtle);
    padding:15px;
    margin:20px 0;
    border-left:4px solid var(--accent);
}

textarea{
    width:100%;
    height:220px;
    background:#000;
    color:var(--accent);
    border:1px solid #333;
    padding:12px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:15px;
    background:var(--accent);
    color:#000;
    border:none;
    font-weight:bold;
    cursor:pointer;
    margin-top:10px;
}

#overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.9);
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:999;
}

#results{
    display:none;
    margin-top:20px;
    background:#111;
    border:1px solid #333;
    padding:15px;
}

.error{
    color:#ff5555;
}

ul{
    margin-top:5px;
}

</style>
</head>
<body>

<div id="overlay">
    <h2 id="status" style="color:#00ff41;">
        ANALYZING...
    </h2>
</div>

<div class="container">

<h1>GT SYSTEMS</h1>

<div class="manifesto">
"The oblong box in the corner of the room doesn't inform you; it programs you.
An independent signal is the only thing a system cannot own."
</div>

<textarea
id="input"
placeholder="Paste article, transcript, social post, or YouTube URL..."
></textarea>

<button onclick="run()">
ANALYZE GROUND TRUTH
</button>

<div id="results">

<div class="error" id="error"></div>

<p>
<strong>Persuasion Score:</strong>
<span id="score">-</span>
</p>

<p>
<strong>Techniques Detected:</strong>
<span id="triggers"></span>
</p>

<p>
<strong>Summary:</strong>
<span id="summary"></span>
</p>

<p><strong>Key Observations:</strong></p>
<ul id="observations"></ul>

<p><strong>Framing Notes:</strong></p>
<ul id="framing"></ul>

<p>
<strong>Source Node:</strong>
<span id="node"></span>
</p>

</div>

</div>

<script>

async function run(){

    const input =
        document
        .getElementById("input")
        .value
        .trim();

    if(!input){
        alert("Input required");
        return;
    }

    document
        .getElementById("overlay")
        .style.display="flex";

    const status =
        document.getElementById("status");

    const msgs=[
        "DETECTING INPUT...",
        "EXTRACTING SIGNAL...",
        "ANALYZING LANGUAGE...",
        "IDENTIFYING FRAMING...",
        "GENERATING REPORT..."
    ];

    let i=0;

    const anim=setInterval(()=>{
        status.innerText=msgs[i%msgs.length];
        i++;
    },1000);

    try{

        const res=
            await fetch("/api/analyze",{
                method:"POST",
                headers:{
                    "Content-Type":"application/json"
                },
                body:JSON.stringify({
                    input
                })
            });

        const data=
            await res.json();

        clearInterval(anim);

        document
            .getElementById("overlay")
            .style.display="none";

        if(!res.ok){
            throw new Error(
                data.error ||
                "Analysis failed"
            );
        }

        render(data);

    }catch(err){

        clearInterval(anim);

        document
            .getElementById("overlay")
            .style.display="none";

        document
            .getElementById("results")
            .style.display="block";

        document
            .getElementById("error")
            .innerText=err.message;
    }
}

function safeArray(v){
    return Array.isArray(v)
        ? v
        : [];
}

function render(data){

    document
        .getElementById("results")
        .style.display="block";

    document
        .getElementById("error")
        .innerText="";

    document
        .getElementById("score")
        .innerText=data.noise_score ?? 0;

    document
        .getElementById("triggers")
        .innerText=
            safeArray(
                data.emotional_triggers
            ).join(", ");

    document
        .getElementById("summary")
        .innerText=
            data.logic_breakdown?.summary
            || "";

    const obs=
        document.getElementById(
            "observations"
        );

    obs.innerHTML="";

    safeArray(
        data.logic_breakdown
        ?.key_observations
    ).forEach(x=>{

        const li=
            document.createElement("li");

        li.textContent=x;

        obs.appendChild(li);
    });

    const fr=
        document.getElementById(
            "framing"
        );

    fr.innerHTML="";

    safeArray(
        data.logic_breakdown
        ?.framing_notes
    ).forEach(x=>{

        const li=
            document.createElement("li");

        li.textContent=x;

        fr.appendChild(li);
    });

    document
        .getElementById("node")
        .innerText=
            data.node || "unknown";
}

</script>

</body>
</html>
