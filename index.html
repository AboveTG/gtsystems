<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GT Systems | Ground Truth</title>

<style>
:root {
    --bg:#0a0a0a;
    --text:#e0e0e0;
    --accent:#00ff41;
    --subtle:#1a1a1a;
}

body {
    background:var(--bg);
    color:var(--text);
    font-family:monospace;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    margin:0;
    padding:20px;
}

.container { width:100%; max-width:720px; }

h1 { color:var(--accent); text-align:center; }

.manifesto {
    background:var(--subtle);
    padding:15px;
    border-left:4px solid var(--accent);
    margin:20px 0;
}

textarea, input {
    width:100%;
    background:#000;
    color:var(--accent);
    border:1px solid #333;
    padding:10px;
    margin-bottom:10px;
}

textarea { height:120px; }

button {
    width:100%;
    padding:15px;
    background:var(--accent);
    border:none;
    font-weight:bold;
    cursor:pointer;
}

#overlay {
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.9);
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

#results {
    display:none;
    margin-top:20px;
    background:#111;
    border:1px solid #333;
    padding:15px;
}

.error {
    color:#ff3e3e;
    margin-bottom:10px;
}
</style>
</head>

<body>

<div id="overlay">
    <div id="status" style="color:#00ff41;">ANALYZING...</div>
</div>

<div class="container">

<h1>GT SYSTEMS</h1>

<div class="manifesto">
    Independent signal extraction system
</div>

<input id="inputUrl" placeholder="YouTube URL (optional)" />

<textarea id="inputText" placeholder="Paste text (optional)"></textarea>

<button onclick="run()">ANALYZE</button>

<div id="results">

    <div class="error" id="error"></div>

    <p>Score: <span id="score">-</span></p>

    <p>Triggers: <span id="triggers"></span></p>

    <p>Summary: <span id="summary"></span></p>

    <p>Observations:</p>
    <ul id="observations"></ul>

    <p>Framing:</p>
    <ul id="framing"></ul>

    <p>Node: <span id="node"></span></p>

</div>

</div>

<script>

async function run() {

    const url = document.getElementById("inputUrl").value.trim();
    const text = document.getElementById("inputText").value.trim();

    if (!url && !text) {
        alert("Input required");
        return;
    }

    document.getElementById("overlay").style.display = "flex";

    const status = document.getElementById("status");

    const msgs = [
        "ANALYZING...",
        "DETECTING INPUT TYPE...",
        "CHUNKING SIGNAL...",
        "RUNNING MULTI-PASS ANALYSIS...",
        "AGGREGATING RESULTS..."
    ];

    let i = 0;
    const anim = setInterval(() => {
        status.innerText = msgs[i % msgs.length];
        i++;
    }, 1000);

    try {

        const payload = url ? { url } : { text };

        const res = await fetch("/api/analyze", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        });

        const data = await res.json();

        clearInterval(anim);
        document.getElementById("overlay").style.display = "none";

        if (!res.ok) {
            throw new Error(data.error || "Analysis failed");
        }

        render(data);

    } catch (e) {

        clearInterval(anim);
        document.getElementById("overlay").style.display = "none";

        document.getElementById("results").style.display = "block";
        document.getElementById("error").innerText = e.message;
    }
}

function safe(v) {
    return Array.isArray(v) ? v : [];
}

function render(data) {

    document.getElementById("results").style.display = "block";

    document.getElementById("error").innerText = "";

    document.getElementById("score").innerText =
        data.noise_score ?? 0;

    document.getElementById("triggers").innerText =
        safe(data.emotional_triggers).join(", ");

    document.getElementById("summary").innerText =
        data?.logic_breakdown?.summary || "No summary";

    const obs = document.getElementById("observations");
    obs.innerHTML = "";
    safe(data?.logic_breakdown?.key_observations).forEach(x => {
        const li = document.createElement("li");
        li.textContent = x;
        obs.appendChild(li);
    });

    const fr = document.getElementById("framing");
    fr.innerHTML = "";
    safe(data?.logic_breakdown?.framing_notes).forEach(x => {
        const li = document.createElement("li");
        li.textContent = x;
        fr.appendChild(li);
    });

    document.getElementById("node").innerText =
        data.node || "unknown";
}

</script>

</body>
</html>
