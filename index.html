<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GT Systems</title>

<style>
body {
    background:#0a0a0a;
    color:#e0e0e0;
    font-family:monospace;
    padding:40px;
}

textarea {
    width:100%;
    height:160px;
    background:#000;
    color:#00ff41;
    border:1px solid #333;
}

button {
    width:100%;
    padding:15px;
    margin-top:10px;
    background:#00ff41;
    border:none;
    cursor:pointer;
}

#results {
    margin-top:20px;
    display:none;
    border:1px solid #333;
    padding:15px;
}
</style>
</head>

<body>

<h2>GT SYSTEMS</h2>

<textarea id="input"></textarea>

<button onclick="run()">ANALYZE</button>

<div id="results">

    <h3>Score: <span id="score">0</span></h3>

    <div>
        <strong>Triggers</strong>
        <div id="triggers"></div>
    </div>

    <div>
        <strong>Analysis</strong>
        <pre id="analysis"></pre>
    </div>

</div>

<script>
async function run() {

    const text = document.getElementById("input").value.trim();
    if (!text) return alert("Input required");

    const res = await fetch("/api/groq", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ text })
    });

    const data = await res.json();

    document.getElementById("results").style.display = "block";

    document.getElementById("score").innerText =
        data.noise_score ?? 0;

    document.getElementById("triggers").innerText =
        (data.emotional_triggers || []).join(", ");

    document.getElementById("analysis").innerText =
        data.logic_breakdown || "No analysis returned";
}
</script>

</body>
</html>
