<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ground Truth Systems</title>

<style>
body {
    margin:0;
    background:#0a0a0a;
    color:#e0e0e0;
    font-family:monospace;
}

#ui {
    width:420px;
    padding:20px;
}

textarea {
    width:100%;
    height:120px;
    background:#000;
    color:#00ff41;
    border:1px solid #333;
    padding:10px;
}

button {
    width:100%;
    padding:12px;
    margin-top:10px;
    background:#00ff41;
    border:none;
    font-weight:bold;
    cursor:pointer;
}

.panel {
    margin-top:12px;
    background:#111;
    padding:10px;
    border:1px solid #333;
}

.bar {
    height:8px;
    background:#222;
    margin:6px 0;
}

.bar > div {
    height:100%;
    background:#00ff41;
}
</style>
</head>

<body>

<div id="ui">

    <textarea id="input"></textarea>
    <button onclick="run()">ANALYZE</button>

    <div class="panel">
        <b>Signal Level:</b> <span id="signal">-</span><br>
        <b>Analysis Quality:</b> <span id="quality">-</span>
    </div>

    <div class="panel">
        <b>Persuasion Intensity</b>
        <div class="bar"><div id="intensity"></div></div>
    </div>

    <div class="panel">
        <b>Final Summary</b>
        <div id="summary"></div>
    </div>

    <div class="panel">
        <b>Framing</b>
        <pre id="framing"></pre>
    </div>

    <div class="panel">
        <b>Error</b>
        <pre id="error"></pre>
    </div>

</div>

<script>

async function run() {

    const input = document.getElementById("input").value;

    const res = await fetch("/api/analyze", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ input })
    });

    const data = await res.json();

    if (!data.ok) {
        document.getElementById("error").innerText =
            data.error || "unknown_error";
        return;
    }

    const report = data.report;

    // -----------------------
    // META
    // -----------------------
    document.getElementById("signal").innerText =
        report.meta?.signal_level ?? "-";

    // -----------------------
    // SUMMARY
    // -----------------------
    document.getElementById("summary").innerText =
        report.summary?.brief ?? "-";

    // -----------------------
    // PERSUASION
    // -----------------------
    const intensity = report.influence?.persuasion_intensity ?? 0;
    document.getElementById("intensity").style.width =
        Math.min(100, intensity * 100) + "%";

    // -----------------------
    // FRAMING
    // -----------------------
    document.getElementById("framing").innerText =
        JSON.stringify(report.framing ?? {}, null, 2);

    // -----------------------
    // QUALITY (optional display fallback)
    // -----------------------
    document.getElementById("quality").innerText =
        report.influence?.confidence ?? "-";
}

    // METRICS
    document.getElementById("signal").innerText =
        data.meta?.signal_level ?? "-";

    document.getElementById("quality").innerText =
        data.meta?.analysis_quality ?? "-";

    // INTENSITY
    const intensity = data.content?.persuasion_intensity ?? 0;
    document.getElementById("intensity").style.width =
        Math.min(100, intensity * 100) + "%";

    // SUMMARY (FIXED + RESTORED)
    document.getElementById("summary").innerText =
        data.content?.summary ?? "-";

    // FRAMING
    document.getElementById("framing").innerText =
        JSON.stringify(data.content?.framing ?? {}, null, 2);
}

</script>

</body>
</html>
