<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ground Truth Systems</title>

<style>
body {
    margin:0;
    background:#0a0a0a;
    color:#e0e0e0;
    font-family:monospace;
    overflow:hidden;
}

#ui {
    position:absolute;
    top:20px;
    left:20px;
    width:380px;
    z-index:10;
}

textarea {
    width:100%;
    height:120px;
    background:#000;
    color:#00ff41;
    border:1px solid #333;
    padding:10px;
}

button {
    width:100%;
    padding:12px;
    margin-top:10px;
    background:#00ff41;
    border:none;
    font-weight:bold;
    cursor:pointer;
}

.panel {
    margin-top:10px;
    background:#111;
    padding:10px;
    border:1px solid #333;
}

canvas {
    position:absolute;
    top:0;
    left:0;
}

/* influence bars */
.bar {
    height:8px;
    background:#222;
    margin:4px 0;
    position:relative;
}

.bar > div {
    height:100%;
    background:#00ff41;
}
</style>
</head>

<body>

<canvas id="graph"></canvas>

<div id="ui">
    <textarea id="input" placeholder="Paste URL, text, video link..."></textarea>
    <button onclick="run()">ANALYZE INFLUENCE</button>

    <div class="panel">
        <div><b>Signal Level:</b> <span id="signal">-</span></div>
        <div><b>Confidence:</b> <span id="confidence">-</span></div>
    </div>

    <div class="panel">
        <b>Influence Profile</b>

        <div>Fear</div>
        <div class="bar"><div id="fear"></div></div>

        <div>Urgency</div>
        <div class="bar"><div id="urgency"></div></div>

        <div>Authority</div>
        <div class="bar"><div id="authority"></div></div>

        <div>Emotional Pressure</div>
        <div class="bar"><div id="emotion"></div></div>
    </div>

    <div class="panel">
        <b>Framing</b>
        <pre id="framing"></pre>
    </div>

    <div class="panel">
        <b>Ground Truth Summary</b>
        <pre id="summary"></pre>
    </div>
</div>

<script>

async function run() {

    const input = document.getElementById("input").value;

    const res = await fetch("/api/analyze", {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({ input })
    });

    const data = await res.json();

    // basic metadata
    document.getElementById("signal").innerText = data.signal_level;
    document.getElementById("confidence").innerText = data.confidence;

    // NOTE: expects future backend upgrade (important)
    const r = data.rhetoric?.signals || [];

    function get(type) {
        const hit = r.find(x => x.type === type);
        return hit ? Math.min(100, hit.count * 20) : 0;
    }

    // influence bars (derived from backend signals)
    document.getElementById("fear").style.width = get("fear") + "%";
    document.getElementById("urgency").style.width = get("urgency") + "%";
    document.getElementById("authority").style.width = get("authority") + "%";
    document.getElementById("emotion").style.width = get("emotion") + "%";

    // framing (placeholder until backend upgrade)
    document.getElementById("framing").innerText =
        JSON.stringify(data.logic_breakdown?.framing_notes || [], null, 2);

    document.getElementById("summary").innerText =
        data.logic_breakdown?.summary || "";
}

</script>

</body>
</html>
