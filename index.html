<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GT Systems | Ground Truth</title>

<style>
:root {
    --bg:#0a0a0a;
    --text:#e0e0e0;
    --accent:#00ff41;
    --subtle:#1a1a1a;
}

body {
    background:var(--bg);
    color:var(--text);
    font-family:monospace;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    margin:0;
    padding:20px;
}

.container {
    width:100%;
    max-width:720px;
}

h1 {
    color:var(--accent);
    text-align:center;
}

.manifesto {
    background:var(--subtle);
    padding:15px;
    border-left:4px solid var(--accent);
    margin:20px 0;
}

textarea, input {
    width:100%;
    padding:10px;
    margin-bottom:10px;
    background:#000;
    color:var(--accent);
    border:1px solid #333;
}

textarea { height:140px; }

button {
    width:100%;
    padding:15px;
    background:var(--accent);
    border:none;
    font-weight:bold;
    cursor:pointer;
}

#overlay {
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.9);
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:10;
}

#results {
    display:none;
    margin-top:20px;
    padding:15px;
    background:#050505;
    border:1px solid #333;
}
</style>
</head>

<body>

<div id="overlay">
    <div id="status" style="color:#00ff41;">ANALYZING...</div>
</div>

<div class="container">

<h1>GT SYSTEMS</h1>

<div class="manifesto">
"The oblong box in the corner doesn't inform you; it programs you."
</div>

<input id="videoUrl" placeholder="Video URL (optional)" />
<textarea id="input" placeholder="Paste text or article (optional)"></textarea>

<button onclick="run()">ANALYZE GROUND TRUTH</button>

<div id="results">
    <div>Score: <span id="score">-</span></div>
    <div>Triggers: <span id="triggers">-</span></div>
    <div>Summary: <span id="summary">-</span></div>
    <div>Node: <span id="node">-</span></div>
</div>

</div>

<script>

function safeArray(v) {
    return Array.isArray(v) ? v : [];
}

function safeText(v, fallback="No data") {
    return (typeof v === "string" && v.trim()) ? v : fallback;
}

async function run() {

const text = document.getElementById("input").value.trim();
const url = document.getElementById("videoUrl").value.trim();

if (!text && !url) {
    alert("Provide input or URL");
    return;
}

document.getElementById("overlay").style.display = "flex";

const status = document.getElementById("status");

const msgs = [
    "ANALYZING INPUT...",
    "EXTRACTING SIGNAL...",
    "EVALUATING LANGUAGE...",
    "FINALIZING..."
];

let i = 0;
const anim = setInterval(() => {
    status.innerText = msgs[i % msgs.length];
    i++;
}, 1000);

try {

    let endpoint = "/api/analyze";
    let payload = { text };

    if (url) {
        endpoint = "/api/video-url";
        payload = { url };
    }

    const res = await fetch(endpoint, {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify(payload)
    });

    const data = await res.json();

    clearInterval(anim);
    document.getElementById("overlay").style.display = "none";

    if (!res.ok || data.error) {
        throw new Error(data.error || "Request failed");
    }

    render(data);

} catch (e) {
    clearInterval(anim);
    document.getElementById("overlay").style.display = "none";
    alert(e.message);
}

}

function render(data) {

document.getElementById("results").style.display = "block";

document.getElementById("score").innerText =
    typeof data.noise_score === "number"
        ? data.noise_score
        : 0;

document.getElementById("triggers").innerText =
    safeArray(data.emotional_triggers).join(", ");

document.getElementById("summary").innerText =
    safeText(data?.logic_breakdown?.summary);

document.getElementById("node").innerText =
    data.node || "unknown";

}

</script>

</body>
</html>
