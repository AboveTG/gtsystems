<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<title>GT Systems</title>

<style>
body {
    margin:0;
    background:#0a0a0a;
    color:#e0e0e0;
    font-family: monospace;
}

#ui { width:420px; padding:20px; }

textarea {
    width:100%;
    height:120px;
    background:#000;
    color:#00ff41;
    border:1px solid #333;
}

button {
    width:100%;
    padding:12px;
    margin-top:10px;
    background:#00ff41;
    border:none;
    font-weight:bold;
}

.panel {
    margin-top:12px;
    background:#111;
    padding:10px;
    border:1px solid #333;
}
</style>
</head>

<body>

<div id="ui">
    <textarea id="input"></textarea>
    <button onclick="run()">ANALYZE</button>

    <div class="panel">
        Signal: <span id="signal">-</span><br>
        Quality: <span id="quality">-</span>
    </div>

    <div class="panel">
        Persuasion: <span id="persuasion">-</span>
    </div>

    <div class="panel">
        Framing:
        <pre id="framing"></pre>
    </div>

    <div class="panel">
        Error:
        <pre id="error"></pre>
    </div>
</div>

<script>

async function run() {
    const input = document.getElementById("input").value;

    let data;

    try {
        const res = await fetch("/api/analyze", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ input })
        });

        const raw = await res.text();

        try {
            data = JSON.parse(raw);
        } catch (e) {
            document.getElementById("error").innerText =
                "Non-JSON response:\n" + raw.slice(0, 300);
            return;
        }

    } catch (err) {
        document.getElementById("error").innerText = err.message;
        return;
    }

    // SAFE UI BINDING
    document.getElementById("signal").innerText =
        data.signal_level ?? "-";

    document.getElementById("quality").innerText =
        data.analysis_quality ?? "-";

    document.getElementById("persuasion").innerText =
        data.persuasion_intensity ?? "-";

    document.getElementById("framing").innerText =
        JSON.stringify(data.framing ?? {}, null, 2);

    document.getElementById("error").innerText =
        data.error ?? "";
}

</script>

</body>
</html>
