<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<title>GT Systems</title>

<style>
body{
    background:#0a0a0a;
    color:#e0e0e0;
    font-family:monospace;
    display:flex;
    justify-content:center;
    padding:30px;
}

.container{ width:100%; max-width:900px; }

h1{ color:#00ff41; text-align:center; }

textarea{
    width:100%;
    height:180px;
    background:#000;
    color:#00ff41;
    border:1px solid #333;
    padding:12px;
}

button{
    width:100%;
    padding:14px;
    background:#00ff41;
    border:0;
    font-weight:bold;
    cursor:pointer;
}

.panel{
    margin-top:20px;
    background:#111;
    padding:15px;
    border:1px solid #333;
}

.good{ color:#00ff41; }
.warn{ color:#ffcc00; }
.bad{ color:#ff4d4d; }
</style>
</head>

<body>

<div class="container">

<h1>GT SYSTEMS</h1>

<textarea id="input" placeholder="Text or YouTube URL"></textarea>

<button onclick="run()">ANALYZE</button>

<div id="output" class="panel" style="display:none">

<div id="signal"></div>
<div>Node: <span id="node"></span></div>

<hr>

<div>Score: <span id="score"></span></div>
<div>Confidence: <span id="confidence"></span></div>
<div>Source: <span id="source"></span></div>

<div>Triggers: <span id="triggers"></span></div>

<div>Summary:</div>
<div id="summary"></div>

<div>Observations:</div>
<ul id="obs"></ul>

<div>Framing:</div>
<ul id="frame"></ul>

</div>

</div>

<script>

async function run(){
    const input = document.getElementById("input").value.trim();
    if(!input) return;

    const res = await fetch("/api/analyze", {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({ input })
    });

    const data = await res.json();

    document.getElementById("output").style.display = "block";

    const map = {
        0:["NO SIGNAL","bad"],
        1:["METADATA ONLY","warn"],
        2:["PARTIAL SIGNAL","warn"],
        3:["FULL SIGNAL","good"]
    };

    const [label, cls] = map[data.signal_level || 0];

    document.getElementById("signal").innerHTML =
        `<span class="${cls}">${label}</span>`;

    document.getElementById("node").innerText = data.node;
    document.getElementById("score").innerText = data.noise_score ?? "N/A";
    document.getElementById("confidence").innerText = data.confidence ?? 0;
    document.getElementById("source").innerText = data.source_type;

    document.getElementById("triggers").innerText =
        (data.emotional_triggers || []).join(", ");

    document.getElementById("summary").innerText =
        data.logic_breakdown?.summary || "";

    const obs = document.getElementById("obs");
    obs.innerHTML = "";
    (data.logic_breakdown?.key_observations || []).forEach(x=>{
        const li=document.createElement("li");
        li.textContent=x;
        obs.appendChild(li);
    });

    const fr = document.getElementById("frame");
    fr.innerHTML = "";
    (data.logic_breakdown?.framing_notes || []).forEach(x=>{
        const li=document.createElement("li");
        li.textContent=x;
        fr.appendChild(li);
    });
}

</script>

</body>
</html>
