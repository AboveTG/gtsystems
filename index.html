<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<title>GT Systems</title>

<style>
body {
    background:#0a0a0a;
    color:#e0e0e0;
    font-family:monospace;
    display:flex;
    justify-content:center;
    padding:40px;
}

.container { width:100%; max-width:900px; }

textarea {
    width:100%;
    height:160px;
    background:#000;
    color:#00ff41;
    border:1px solid #333;
    padding:10px;
}

button {
    width:100%;
    padding:14px;
    margin-top:10px;
    background:#00ff41;
    border:none;
    font-weight:bold;
}

.panel {
    margin-top:20px;
    background:#111;
    padding:15px;
    border:1px solid #333;
}

.small { color:#888; font-size:12px; }

.badge {
    display:inline-block;
    padding:3px 8px;
    margin:4px 0;
}
</style>
</head>

<body>

<div class="container">

<h1>GT SYSTEMS</h1>

<div class="small">
Universal ingestion engine (text • URL • YouTube • social)
</div>

<textarea id="input" placeholder="Paste anything..."></textarea>

<button onclick="run()">ANALYZE</button>

<div id="out" class="panel" style="display:none">

<div id="meta"></div>

<div><b>Score:</b> <span id="score"></span></div>
<div><b>Confidence:</b> <span id="conf"></span></div>
<div><b>Source:</b> <span id="src"></span></div>

<div><b>Triggers:</b> <span id="trig"></span></div>

<hr/>

<div id="summary"></div>

<ul id="obs"></ul>
<ul id="frame"></ul>

</div>

</div>

<script>

async function run() {
    const input = document.getElementById("input").value.trim();
    if (!input) return;

    const res = await fetch("/api/analyze", {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({ input })
    });

    const data = await res.json();

    document.getElementById("out").style.display = "block";

    document.getElementById("score").innerText = data.noise_score ?? "N/A";
    document.getElementById("conf").innerText = data.confidence ?? 0;
    document.getElementById("src").innerText = data.source_type;
    document.getElementById("trig").innerText = (data.emotional_triggers || []).join(", ");
    document.getElementById("summary").innerText = data.logic_breakdown?.summary || "";

    const obs = document.getElementById("obs");
    const frame = document.getElementById("frame");

    obs.innerHTML = "";
    frame.innerHTML = "";

    (data.logic_breakdown?.key_observations || []).forEach(x=>{
        const li = document.createElement("li");
        li.textContent = x;
        obs.appendChild(li);
    });

    (data.logic_breakdown?.framing_notes || []).forEach(x=>{
        const li = document.createElement("li");
        li.textContent = x;
        frame.appendChild(li);
    });
}

</script>

</body>
</html>
